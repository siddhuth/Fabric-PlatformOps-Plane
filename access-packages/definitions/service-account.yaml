# access-packages/definitions/service-account.yaml
#
# Access package for Service Principals (SPNs) used in automated
# pipelines, scheduled refreshes, and API-driven workloads.
# Managed outside Entra Access Packages (no human approval flow).

package:
  name: service-account-sales-automation
  version: "1.0"
  entra_group: sg-fabric-spn-sales
  approval_policy: platform-team-only  # No manager approval; platform team manages SPNs
  expiration_days: null  # No expiration for service accounts; recertify quarterly
  description: >
    Service principal identity for automated data pipeline execution,
    scheduled semantic model refreshes, and programmatic OneLake access.
    Requires explicit Fabric Admin Portal enablement for SPN API access.

grants:
  workspace:
    id: ${WORKSPACE_SALES_ID}
    role: Contributor  # Needed for pipeline execution and item management

  items:
    - type: MirroredDatabase
      name: sales-mirror-db
      permissions:
        - Read
        - ReadAll
      additional_permissions:
        - ReadAllApacheSpark

    - type: SemanticModel
      name: sales-default-model
      permissions:
        - Read
        - Write    # Needed for programmatic refresh
        - Execute  # Trigger refresh via API

    - type: DataPipeline
      name: sales-ingestion-pipeline
      permissions:
        - Read
        - Execute

  compute:
    sql_endpoint:
      grants:
        - ALTER ROLE db_datareader ADD MEMBER [${SPN_APP_ID}]
        - GRANT EXECUTE ON SCHEMA::dbo TO [${SPN_APP_ID}]
      rls_role: null  # SPNs bypass RLS for full data access

    onelake:
      security_role: spn-full-read
      paths:
        - "/Tables/*"
        - "/Files/*"

  prerequisites:
    fabric_admin_settings:
      - "Service principals can use Fabric APIs: Enabled"
      - "Service principals can access admin APIs: Enabled (specific group)"
    workspace_identity:
      - "SPN must be added to workspace before first API call"
      - "Initial token bootstrap required via Fabric REST API list call"

metadata:
  owner: platform-team
  domain: sales
  sensitivity: confidential
  last_reviewed: "2026-03-01"
  review_cadence_days: 90
  recertification_required: true
